<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ja'farbek Yusupov</title>
  <meta name="description" content="Backend developer. I build the parts of software nobody sees." />
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body { cursor: none; }
    a, button { cursor: none; }
    ::selection { background: #8aab5a; color: #1a1f16; }

    body {
      background: #1a1f16;
      color: #d4d8c8;
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3.5rem 1.5rem;
    }

    .inner { max-width: 540px; width: 100%; animation: fadein 0.6s ease both; }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #8aab5a;
      letter-spacing: 0.1em;
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tag::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #8aab5a;
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(36px, 8vw, 44px);
      font-weight: 700;
      line-height: 1.08;
      color: #e8ecdc;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .role {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #6a8a42;
      margin-bottom: 2rem;
      letter-spacing: 0.04em;
    }

    .bio {
      font-size: 15px;
      line-height: 1.8;
      color: #9aa08a;
      margin-bottom: 2.5rem;
      padding-left: 1rem;
      border-left: 2px solid #2e3828;
    }

    .divider { height: 1px; background: #252b1f; margin-bottom: 1.75rem; }

    .socials {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .socials::-webkit-scrollbar { display: none; }

    .socials a {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #9aa08a;
      text-decoration: none;
      border: 1px solid #2e3828;
      background: #1f2519;
      padding: 8px 11px;
      border-radius: 6px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .socials a:hover {
      border-color: #8aab5a;
      color: #c8dca0;
      background: #252d1c;
    }

    .socials a svg { width: 12px; height: 12px; flex-shrink: 0; }

    footer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #3a4030;
      margin-top: 3rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<div id="cursor"></div>
<style>
  #cursor {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #8aab5a;
    position: fixed;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: width 0.15s, height 0.15s, background 0.15s;
    box-shadow:
      0 0 6px 2px #8aab5a,
      0 0 14px 4px rgba(138,171,90,0.5),
      0 0 28px 8px rgba(138,171,90,0.2);
    z-index: 9999;
  }
  #cursor.hover {
    width: 7px; height: 7px;
    background: #c8dca0;
    box-shadow:
      0 0 6px 2px #c8dca0,
      0 0 16px 5px rgba(200,220,160,0.5),
      0 0 32px 10px rgba(200,220,160,0.25);
  }
</style>
<script>
  const cur = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => cur.classList.add('hover'));
    el.addEventListener('mouseleave', () => cur.classList.remove('hover'));
  });
</script>
